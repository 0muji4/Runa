# Runa backend API contract.
#
# This is the GROWING contract between the backend and the shared/UI clients.
# Every new endpoint MUST be added here so the mobile clients have a single
# source of truth for the API surface.
openapi: 3.0.3
info:
  title: Runa Backend API
  version: 0.2.0
  description: |
    HTTP API for the Runa (moon-themed) app. Served under the /api/v1 base path.
    Clients are injected host+port only and append /api/v1/... themselves.

    Authentication: endpoints under /api/v1 are public except GET /me, which
    requires a Bearer access token. Access tokens are short-lived HS256 JWTs;
    refresh tokens are long-lived opaque strings, stored server-side only as a
    hash and rotated on every /auth/refresh.
servers:
  - url: http://localhost:8080
    description: Local development (iOS simulator uses this host)
  - url: http://10.0.2.2:8080
    description: Local development (Android emulator loopback to host)
paths:
  /api/v1/healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"
              example:
                status: ok

  /api/v1/auth/signup:
    post:
      operationId: authSignup
      summary: Create an account with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Account created; returns tokens and the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/login:
    post:
      operationId: authLogin
      summary: Log in with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated; returns tokens and the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          description: Email or password is incorrect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/apple:
    post:
      operationId: authApple
      summary: Sign in with an Apple ID token
      description: |
        The client obtains an Apple ID token natively (iOS: ASAuthorization;
        Android: Apple web OAuth) and posts it here. The server verifies the
        token signature against Apple's JWKS and creates/links the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppleLoginRequest"
      responses:
        "200":
          description: Authenticated; returns tokens and the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/ProviderVerificationError"

  /api/v1/auth/google:
    post:
      operationId: authGoogle
      summary: Sign in with a Google ID token
      description: |
        The client obtains a Google ID token natively (Android: Credential
        Manager; iOS: GoogleSignIn SDK) and posts it here. The server verifies
        the token signature against Google's JWKS and creates/links the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleLoginRequest"
      responses:
        "200":
          description: Authenticated; returns tokens and the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/ProviderVerificationError"

  /api/v1/auth/refresh:
    post:
      operationId: authRefresh
      summary: Exchange a refresh token for a new token pair
      description: |
        Rotates the refresh token: the presented token is revoked and a new
        access + refresh pair is returned. The user object is not re-sent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          description: Refresh token is unknown, revoked or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/logout:
    post:
      operationId: authLogout
      summary: Revoke a refresh token
      description: Idempotent — revoking an unknown token still returns 204.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Refresh token revoked (or already absent).
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/v1/me:
    get:
      operationId: getMe
      summary: Get the authenticated user (protected)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The authenticated user's record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing, invalid or expired access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HS256 access token returned by any auth endpoint.

  responses:
    ValidationError:
      description: The request body failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: validation_error
              message: validation failed
              details:
                - field: email
                  message: must be a valid email address
    ProviderVerificationError:
      description: The provider ID token could not be verified.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: provider_verification_failed
              message: could not verify the provider token
    RateLimited:
      description: Too many requests; try again later.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: rate_limited
              message: too many requests, please try again later

  schemas:
    HealthzResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    SignupRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        display_name:
          type: string
          description: Optional; derived from the email local part when omitted.

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AppleLoginRequest:
      type: object
      required:
        - id_token
      properties:
        id_token:
          type: string
          description: Apple ID token (JWT) obtained on the client.
        display_name:
          type: string
          description: |
            Optional; Apple only returns the user's name on first authorization,
            so the client forwards it when available.

    GoogleLoginRequest:
      type: object
      required:
        - id_token
      properties:
        id_token:
          type: string
          description: Google ID token (JWT) obtained on the client.

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    AuthTokens:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Access-token lifetime in seconds.
        user:
          allOf:
            - $ref: "#/components/schemas/User"
          description: Present on signup/login/apple/google; omitted on refresh.

    User:
      type: object
      required:
        - id
        - display_name
        - auth_provider
        - is_premium
        - created_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          nullable: true
        display_name:
          type: string
        auth_provider:
          type: string
          enum: [email, apple, google]
        is_premium:
          type: boolean
        premium_expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - validation_error
                - invalid_credentials
                - email_taken
                - unauthorized
                - token_expired
                - token_invalid
                - provider_verification_failed
                - rate_limited
                - internal_error
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
