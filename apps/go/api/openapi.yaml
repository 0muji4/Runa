# Runa backend API contract.
#
# This is the GROWING contract between the backend and the shared/UI clients.
# Every new endpoint MUST be added here so the mobile clients have a single
# source of truth for the API surface.
openapi: 3.0.3
info:
  title: Runa Backend API
  version: 0.6.0
  description: |
    HTTP API for the Runa (moon-themed) app. Served under the /api/v1 base path.
    Clients are injected host+port only and append /api/v1/... themselves.

    Authentication: the /api/v1/auth/* and /healthz routes are public; GET /me and
    all /api/v1/diary*, /api/v1/today, /api/v1/songs* routes require a Bearer
    access token. Access tokens are short-lived HS256 JWTs; refresh tokens are
    long-lived opaque strings, stored server-side only as a hash and rotated on
    every /auth/refresh. The /api/v1/admin/* seed endpoints use a separate shared
    admin token (X-Admin-Token), not a user session.

    Diary sync: entries are offline-first. The client generates client_id (a UUID)
    so an offline create can be POSTed idempotently on reconnect without
    duplicating. GET /diary/sync?since= returns changes (including deletion
    tombstones) after a watermark; conflicts resolve last-write-wins by updated_at.

    Today: GET /today returns the day's curated quote and song (exact date match;
    either may be null). The moon phase — the home's third element — is NOT served
    here; it is computed on the client in shared code (Meeus-simplified) so the
    home works fully offline. GET /songs is the newest-first song archive and
    POST /songs/{id}/played records play history.

    Gallery (presigned-URL scheme): image BYTES never traverse this API. To add an
    image the client (1) POSTs /gallery/upload-url to get a short-lived presigned
    PUT URL + a server-generated object_key, (2) PUTs the bytes DIRECTLY to the
    object store (S3/MinIO), then (3) POSTs /gallery to register metadata. The
    server re-verifies the real object (existence, size, content-type) at step 3,
    since the presigned PUT enforces none of those. GET /gallery and GET
    /gallery/{id} attach a short-lived presigned GET URL to each image. Presigned
    URL lifetimes: PUT (upload) 15 min, GET (view) 60 min (both configurable).
    Upload limits: max 10 MiB, content-type in {image/jpeg,image/png,image/webp,
    image/heic} (both configurable). Object storage is configured via S3_* env; if
    unset the gallery URL endpoints answer 503. This presigned-URL contract is the
    reusable pattern for all future image features.
servers:
  - url: http://localhost:8080
    description: Local development (iOS simulator uses this host)
  - url: http://10.0.2.2:8080
    description: Local development (Android emulator loopback to host)
paths:
  /api/v1/healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"
              example:
                status: ok

  /api/v1/auth/signup:
    post:
      operationId: authSignup
      summary: Create an account with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Account created; returns tokens and the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/login:
    post:
      operationId: authLogin
      summary: Log in with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated; returns tokens and the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          description: Email or password is incorrect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/apple:
    post:
      operationId: authApple
      summary: Sign in with an Apple ID token
      description: |
        The client obtains an Apple ID token natively (iOS: ASAuthorization;
        Android: Apple web OAuth) and posts it here. The server verifies the
        token signature against Apple's JWKS and creates/links the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppleLoginRequest"
      responses:
        "200":
          description: Authenticated; returns tokens and the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/ProviderVerificationError"

  /api/v1/auth/google:
    post:
      operationId: authGoogle
      summary: Sign in with a Google ID token
      description: |
        The client obtains a Google ID token natively (Android: Credential
        Manager; iOS: GoogleSignIn SDK) and posts it here. The server verifies
        the token signature against Google's JWKS and creates/links the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleLoginRequest"
      responses:
        "200":
          description: Authenticated; returns tokens and the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/ProviderVerificationError"

  /api/v1/auth/refresh:
    post:
      operationId: authRefresh
      summary: Exchange a refresh token for a new token pair
      description: |
        Rotates the refresh token: the presented token is revoked and a new
        access + refresh pair is returned. The user object is not re-sent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          description: Refresh token is unknown, revoked or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/logout:
    post:
      operationId: authLogout
      summary: Revoke a refresh token
      description: Idempotent — revoking an unknown token still returns 204.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Refresh token revoked (or already absent).
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/v1/me:
    get:
      operationId: getMe
      summary: Get the authenticated user (protected)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The authenticated user's record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing, invalid or expired access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMe
      summary: Update the authenticated user's display name (protected)
      description: |
        Replaces display_name. The name is trimmed; an empty result is rejected
        (400) and it may be at most 50 characters.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
      responses:
        "200":
          description: The updated user record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteMe
      summary: Permanently delete the authenticated account (protected)
      description: |
        Hard-deletes the user and every row that cascades from it — refresh
        tokens, diary entries, gallery image rows and song history — in a single
        statement. The user's stored image objects are purged from object storage
        asynchronously (best-effort). This is irreversible: there is no recovery
        window. Refresh tokens are revoked by the cascade; a still-valid access
        token stops working on its next request (the user no longer exists), so the
        residual window is bounded by the short access-token lifetime.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Account deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/export:
    get:
      operationId: exportMe
      summary: Export the caller's data as JSON (protected)
      description: |
        Returns the caller's profile, all live diary entries (tombstones excluded)
        and gallery image metadata. Each image carries a short-lived presigned GET
        URL when object storage is available; `url` is omitted otherwise (the
        metadata still exports). The response is a single JSON document — clients
        that offer a plain-text export render it from this payload.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The export document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/diary:
    get:
      operationId: listDiary
      summary: List the caller's diary entries (protected)
      description: |
        Newest first, keyset pagination. Pass the previous page's `next_cursor`
        as `cursor` to fetch the next page; a null `next_cursor` means the last
        page. Soft-deleted entries are excluded.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque page cursor from a previous response's next_cursor.
      responses:
        "200":
          description: One page of entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiaryListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createDiary
      summary: Create a diary entry (protected, idempotent by client_id)
      description: |
        The client generates client_id (a UUID). Re-POSTing the same client_id
        upserts the same row instead of creating a duplicate — this is how an
        entry authored offline is safely retried once connectivity returns. The
        response is 201 on first insert and 200 on a subsequent idempotent upsert.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDiaryRequest"
      responses:
        "201":
          description: Entry created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiaryEntry"
        "200":
          description: An entry with this client_id already existed; upserted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiaryEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/diary/sync:
    get:
      operationId: syncDiary
      summary: Fetch diary changes since a watermark (protected)
      description: |
        Returns every entry whose updated_at is after `since`, INCLUDING
        tombstones (a deleted entry with deleted_at set), so other devices learn
        of deletions. The response carries `server_time`; the client stores it and
        sends it as the next `since` (last_synced_at). Conflicts are resolved
        last-write-wins by updated_at. Omit `since` to fetch the full history.
      security:
        - bearerAuth: []
      parameters:
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 timestamp; entries changed strictly after it are returned.
      responses:
        "200":
          description: The change delta plus the new server watermark.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiarySyncResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/diary/calendar:
    get:
      operationId: getDiaryCalendar
      summary: Per-day diary entry counts for a month (protected)
      description: |
        Returns, for each local calendar date in the month that has at least one
        entry, how many entries fall on it. Grouping uses the caller's local date
        in `tz` (an IANA zone; default UTC), so the boundary matches the client's
        own local-date grouping — an entry authored at 23:30 local stays on that
        local day even when it is the next day in UTC.

        This is the server-side count of record and an auxiliary consistency check
        only: clients render the calendar from their local database (local-first)
        and reconcile other devices' entries through /diary/sync.
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 9999
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: tz
          in: query
          required: false
          schema:
            type: string
            default: UTC
          description: IANA time zone (e.g. Asia/Tokyo) to group local dates by.
      responses:
        "200":
          description: The month's per-day counts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiaryCalendarResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/diary/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getDiary
      summary: Get one diary entry (protected)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiaryEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateDiary
      summary: Update a diary entry's body and mood (protected)
      description: Replaces body_text and mood. mood may be null to clear it.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDiaryRequest"
      responses:
        "200":
          description: The updated entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiaryEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteDiary
      summary: Soft-delete a diary entry (protected, idempotent)
      description: |
        Sets deleted_at; the tombstone still rides /diary/sync so other devices
        remove it. Deleting an already-deleted own entry still returns 204.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Entry deleted (or already absent for the caller).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/insights:
    get:
      operationId: getInsights
      summary: Per-period diary aggregation — days, entries, mood distribution (protected)
      description: |
        Aggregates the caller's diary entries over one week or one month into day
        counts and a mood distribution. The window is `[start, start+period)`; days
        are grouped by the caller's local date in `tz` (an IANA zone; default UTC),
        so the boundary matches the client's own local-date grouping.

        This is an **auxiliary** server-side aggregation, offered for a future
        server-summary / cross-device path. Clients render insights from their own
        local database (local-first): they compute the same day/mood facts plus the
        streak and the moon-phase overlap, and the poetic summary, entirely offline.
        The moon phase is computed client-side, so it is not returned here.

        Weekly `start` is the client's configured week start (default Sunday);
        monthly `start` is the first of the month. Entries with no mood (older
        entries, or a night left unmarked) are counted in entry_count but excluded
        from mood_distribution and reported as unmooded_count ("未選択").
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [weekly, monthly]
          description: The aggregation window kind.
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Window start (YYYY-MM-DD) — a week start for weekly, the 1st for monthly.
        - name: tz
          in: query
          required: false
          schema:
            type: string
            default: UTC
          description: IANA time zone (e.g. Asia/Tokyo) to group local dates by.
      responses:
        "200":
          description: The period's aggregation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/today:
    get:
      operationId: getToday
      summary: The home payload for a day — daily quote + song (protected)
      description: |
        Returns the curated quote and song for the exact `date`. Either may be
        null when that day has no curated entry; the client still renders (any
        cached copy plus the moon). The MOON PHASE is NOT returned here — it is
        computed on the client in shared code (Meeus-simplified), so the home
        works fully offline. Absent `date` uses the server's current UTC day; the
        client normally sends its own local date (YYYY-MM-DD).
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: YYYY-MM-DD. Defaults to the server's current UTC day.
      responses:
        "200":
          description: The day's quote and song (either may be null).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/songs:
    get:
      operationId: listSongs
      summary: The song archive — past daily songs (protected)
      description: |
        Newest first (by date), keyset pagination. Pass the previous page's
        `next_cursor` as `cursor` to fetch the next page; a null `next_cursor`
        means the last page.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque page cursor from a previous response's next_cursor.
      responses:
        "200":
          description: One page of archived songs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongsListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/songs/{id}/played:
    post:
      operationId: recordSongPlayed
      summary: Record a play of a song (protected)
      description: |
        Appends a play-history row for the caller. The body is optional; a bare
        POST records the play at the server clock. An unknown song id answers 404.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayedRequest"
      responses:
        "204":
          description: Play recorded.
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/admin/quotes:
    post:
      operationId: adminCreateQuote
      summary: Upsert a day's curated quote (admin)
      description: |
        Curated-content injection, gated by the shared admin token in the
        `X-Admin-Token` header (NOT a user session). Upserts by date: re-posting a
        date replaces its quote. The admin surface is DISABLED unless the server
        has ADMIN_API_TOKEN set — otherwise every request answers 403.
      security:
        - adminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "201":
          description: The upserted quote.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/songs:
    post:
      operationId: adminCreateSong
      summary: Upsert a day's curated song (admin)
      description: |
        As POST /admin/quotes, for the daily song. Gated by `X-Admin-Token`;
        upserts by date.
      security:
        - adminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSongRequest"
      responses:
        "201":
          description: The upserted song.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/gallery/upload-url:
    post:
      operationId: createGalleryUploadURL
      summary: Issue a presigned PUT URL for a gallery image upload (protected)
      description: |
        Returns a short-lived presigned PUT URL and the server-generated
        object_key. The client PUTs the raw bytes directly to `upload_url`
        (sending the given Content-Type), then registers metadata with POST
        /gallery. The presigned PUT does not enforce content-type/size — those are
        re-checked against the real object at registration.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryUploadURLRequest"
      responses:
        "200":
          description: The upload target.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryUploadURLResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/gallery:
    get:
      operationId: listGallery
      summary: List the caller's gallery images, newest first (protected)
      description: |
        Keyset pagination on (created_at, id). Each item carries a short-lived
        presigned GET URL (`url`) valid until `url_expires_at`.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
        - name: cursor
          in: query
          required: false
          schema: { type: string }
          description: Opaque next_cursor from a previous page.
      responses:
        "200":
          description: One page of images.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryList"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    post:
      operationId: createGalleryImage
      summary: Register an uploaded image's metadata (protected)
      description: |
        Called after the direct upload. The object_key must be in the caller's
        namespace ("gallery/{user_id}/..."), else 404. The real object is verified
        (existence → 400 if missing, size/content-type re-checked). Idempotent by
        object_key.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGalleryRequest"
      responses:
        "201":
          description: The registered image with a presigned GET URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/gallery/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getGalleryImage
      summary: Get a single gallery image with a presigned GET URL (protected)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The image.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    delete:
      operationId: deleteGalleryImage
      summary: Soft-delete a gallery image (protected)
      description: |
        Soft-deletes the metadata row and removes the stored object
        asynchronously. Idempotent; another user's image is a 404.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted (no body).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HS256 access token returned by any auth endpoint.
    adminAuth:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: |
        Shared admin token for the curated seed endpoints. Set server-side via
        ADMIN_API_TOKEN; when unset the admin endpoints are disabled (403).

  responses:
    ValidationError:
      description: The request body failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: validation_error
              message: validation failed
              details:
                - field: email
                  message: must be a valid email address
    ProviderVerificationError:
      description: The provider ID token could not be verified.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: provider_verification_failed
              message: could not verify the provider token
    RateLimited:
      description: Too many requests; try again later.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: rate_limited
              message: too many requests, please try again later
    Unauthorized:
      description: Missing, invalid or expired access token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: unauthorized
              message: authentication required
    NotFound:
      description: |
        No such entry for the caller. Returned both for a genuinely missing entry
        and for one owned by another user, so existence is never leaked.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: not_found
              message: diary entry not found
    Forbidden:
      description: |
        The admin token was missing or wrong, or the admin surface is disabled
        (no ADMIN_API_TOKEN configured server-side).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: forbidden
              message: admin access forbidden
    ServiceUnavailable:
      description: |
        A backing dependency is unavailable. For gallery endpoints this means
        object storage is not configured/reachable (no S3_* env), so presigned
        URLs cannot be issued.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: service_unavailable
              message: image storage is unavailable

  schemas:
    HealthzResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    SignupRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        display_name:
          type: string
          description: Optional; derived from the email local part when omitted.

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AppleLoginRequest:
      type: object
      required:
        - id_token
      properties:
        id_token:
          type: string
          description: Apple ID token (JWT) obtained on the client.
        display_name:
          type: string
          description: |
            Optional; Apple only returns the user's name on first authorization,
            so the client forwards it when available.

    GoogleLoginRequest:
      type: object
      required:
        - id_token
      properties:
        id_token:
          type: string
          description: Google ID token (JWT) obtained on the client.

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    AuthTokens:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Access-token lifetime in seconds.
        user:
          allOf:
            - $ref: "#/components/schemas/User"
          description: Present on signup/login/apple/google; omitted on refresh.

    User:
      type: object
      required:
        - id
        - display_name
        - auth_provider
        - is_premium
        - created_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          nullable: true
        display_name:
          type: string
        auth_provider:
          type: string
          enum: [email, apple, google]
        is_premium:
          type: boolean
        premium_expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    UpdateMeRequest:
      type: object
      required:
        - display_name
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 50
          description: New display name; trimmed server-side, must be non-empty.

    ExportResponse:
      type: object
      required:
        - exported_at
        - schema_version
        - user
        - diaries
        - images
      properties:
        exported_at:
          type: string
          format: date-time
        schema_version:
          type: integer
          description: Export payload schema version; bumped on breaking changes.
        user:
          $ref: "#/components/schemas/User"
        diaries:
          type: array
          items:
            $ref: "#/components/schemas/DiaryEntry"
          description: All live entries (soft-deleted tombstones are excluded).
        images:
          type: array
          items:
            $ref: "#/components/schemas/ExportImage"

    ExportImage:
      type: object
      required:
        - id
        - object_key
        - width
        - height
        - theme
        - created_at
      properties:
        id:
          type: string
          format: uuid
        object_key:
          type: string
        width:
          type: integer
        height:
          type: integer
        theme:
          type: string
          enum: [monotone, pink]
        created_at:
          type: string
          format: date-time
        url:
          type: string
          description: Short-lived presigned GET URL. Omitted when storage is unavailable.
        url_expires_at:
          type: string
          format: date-time
          description: When `url` expires. Present only when `url` is present.

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - validation_error
                - invalid_credentials
                - email_taken
                - unauthorized
                - token_expired
                - token_invalid
                - provider_verification_failed
                - rate_limited
                - not_found
                - internal_error
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    DiaryEntry:
      type: object
      required:
        - id
        - client_id
        - body_text
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Server-assigned entry id.
        client_id:
          type: string
          format: uuid
          description: Client-generated id; the idempotency key for create.
        body_text:
          type: string
        mood:
          type: string
          nullable: true
          description: Optional; saved but only consumed by a later insights slice.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Set on soft-deleted entries; only appears in /diary/sync.

    CreateDiaryRequest:
      type: object
      required:
        - body_text
        - client_id
      properties:
        body_text:
          type: string
          minLength: 1
        mood:
          type: string
          nullable: true
        client_id:
          type: string
          format: uuid
          description: Client-generated UUID; idempotency key.
        created_at:
          type: string
          format: date-time
          description: Client authoring time; server clock is used when omitted.

    UpdateDiaryRequest:
      type: object
      required:
        - body_text
      properties:
        body_text:
          type: string
          minLength: 1
        mood:
          type: string
          nullable: true
          description: Replaces the stored mood; null clears it.

    DiaryListResponse:
      type: object
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/DiaryEntry"
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null on the last page.

    DiarySyncResponse:
      type: object
      required:
        - entries
        - server_time
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/DiaryEntry"
          description: Changes since `since`, including tombstones (deleted_at set).
        server_time:
          type: string
          format: date-time

    DiaryCalendarResponse:
      type: object
      required:
        - year
        - month
        - days
      properties:
        year:
          type: integer
        month:
          type: integer
        days:
          type: array
          description: Local dates with at least one entry, ascending by date.
          items:
            type: object
            required:
              - date
              - count
            properties:
              date:
                type: string
                format: date
                description: Local calendar date (YYYY-MM-DD) under the requested tz.
              count:
                type: integer

    InsightsResponse:
      type: object
      required:
        - period
        - start
        - days_journaled
        - entry_count
        - unmooded_count
        - mood_distribution
      properties:
        period:
          type: string
          enum: [weekly, monthly]
        start:
          type: string
          format: date
          description: The window's local start date (YYYY-MM-DD) under the requested tz.
        days_journaled:
          type: integer
          description: Distinct local dates in the window with at least one entry.
        entry_count:
          type: integer
          description: Total entries in the window (mood-less ones included).
        unmooded_count:
          type: integer
          description: Entries with no (recognised) mood; excluded from the distribution.
        mood_distribution:
          type: array
          description: >-
            Per-mood counts in the canonical order (calm, gentle, tired, hopeful,
            heavy); moods with no entries are present with count 0.
          items:
            type: object
            required:
              - mood
              - count
            properties:
              mood:
                type: string
                enum: [calm, gentle, tired, hopeful, heavy]
              count:
                type: integer

    Quote:
      type: object
      required:
        - id
        - date
        - body_text
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        body_text:
          type: string

    Song:
      type: object
      required:
        - id
        - date
        - title
        - artist
        - artwork_url
        - audio_url
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        title:
          type: string
        artist:
          type: string
        artwork_url:
          type: string
        audio_url:
          type: string

    TodayResponse:
      type: object
      required:
        - date
      properties:
        date:
          type: string
          format: date
        quote:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Quote"
          description: The day's quote, or null when none is curated for it.
        song:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Song"
          description: The day's song, or null when none is curated for it.

    SongsListResponse:
      type: object
      required:
        - songs
      properties:
        songs:
          type: array
          items:
            $ref: "#/components/schemas/Song"
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null on the last page.

    PlayedRequest:
      type: object
      properties:
        played_at:
          type: string
          format: date-time
          description: When the play happened; the server clock is used when omitted.

    CreateQuoteRequest:
      type: object
      required:
        - date
        - body_text
      properties:
        date:
          type: string
          format: date
        body_text:
          type: string
          minLength: 1

    CreateSongRequest:
      type: object
      required:
        - date
        - title
        - artist
        - artwork_url
        - audio_url
      properties:
        date:
          type: string
          format: date
        title:
          type: string
          minLength: 1
        artist:
          type: string
          minLength: 1
        artwork_url:
          type: string
          minLength: 1
        audio_url:
          type: string
          minLength: 1
          description: Send this back as the next `since` (last_synced_at).

    GalleryUploadURLRequest:
      type: object
      required:
        - content_type
        - size
      properties:
        content_type:
          type: string
          description: MIME type of the image to upload (must be in the allowlist).
          example: image/jpeg
        size:
          type: integer
          format: int64
          minimum: 1
          description: Byte size of the image (must be ≤ the server's max).

    GalleryUploadURLResponse:
      type: object
      required:
        - object_key
        - upload_url
        - method
        - headers
        - expires_at
        - max_size
      properties:
        object_key:
          type: string
          description: Server-generated storage key ("gallery/{user_id}/{uuid}").
        upload_url:
          type: string
          description: Presigned URL to PUT the raw bytes to (client↔store direct).
        method:
          type: string
          example: PUT
        headers:
          type: object
          additionalProperties:
            type: string
          description: Headers to send with the PUT (e.g. Content-Type).
        expires_at:
          type: string
          format: date-time
          description: When the upload URL stops being valid.
        max_size:
          type: integer
          format: int64
          description: Maximum accepted byte size.

    CreateGalleryRequest:
      type: object
      required:
        - object_key
        - width
        - height
        - theme
      properties:
        object_key:
          type: string
          description: The object_key returned by /gallery/upload-url.
        width:
          type: integer
          minimum: 1
        height:
          type: integer
          minimum: 1
        theme:
          type: string
          enum: [monotone, pink]
          description: |
            The image's saved color mood at upload time. Distinct from the
            client-side gallery display-theme toggle, which only re-grades the
            whole grid and is never persisted.

    GalleryImage:
      type: object
      required:
        - id
        - url
        - url_expires_at
        - width
        - height
        - theme
        - created_at
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          description: Short-lived presigned GET URL for the image bytes.
        url_expires_at:
          type: string
          format: date-time
          description: When `url` stops being valid; refetch to refresh.
        width:
          type: integer
        height:
          type: integer
        theme:
          type: string
          enum: [monotone, pink]
        created_at:
          type: string
          format: date-time

    GalleryList:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GalleryImage"
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null on the last page.
