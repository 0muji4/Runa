# XcodeGen spec for the Runa iOS app.
# Regenerate the .xcodeproj with:  xcodegen generate   (run from apps/swift/)
# See README.md for the full build sequence (build the XCFramework first).
name: Runa

options:
  bundleIdPrefix: com.runa
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "16.0"

# Local Swift package that wraps the SKIE-enhanced Shared.xcframework.
packages:
  SharedKit:
    path: SharedKit

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    # 1 = iPhone only. Add 2 for iPad if needed later.
    TARGETED_DEVICE_FAMILY: "1"

targets:
  Runa:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Runa
        # Keep docs (Fonts/README.md etc.) out of the app bundle.
        excludes:
          - "**/README.md"
    settings:
      base:
        PRODUCT_NAME: Runa
        PRODUCT_BUNDLE_IDENTIFIER: com.runa
        # We author Info.plist by hand (it carries BASE_URL + dark-mode lock),
        # so disable the auto-generated one.
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Runa/Info.plist
        # Sign in with Apple entitlement (see Runa/Runa.entitlements).
        CODE_SIGN_ENTITLEMENTS: Runa/Runa.entitlements
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        ENABLE_PREVIEWS: YES
    dependencies:
      # Imports the shared KMP module as `import Shared`.
      - package: SharedKit
        product: Shared
      # Shared.xcframework is a STATIC framework, so system frameworks/libraries
      # referenced only by Kotlin/Native code must be linked by the app target:
      #  - AVFoundation (AVPlayer) + CoreMedia (CMTime) for the today AvAudioPlayer
      #  - libsqlite3 for SQLDelight's NativeSqliteDriver (diary + today DB use)
      - sdk: AVFoundation.framework
      - sdk: CoreMedia.framework
      - sdk: libsqlite3.tbd
      # PhotosUI (PhotosPicker) for the gallery image picker. Used from Swift, so
      # it would auto-link, but listed for parity with the other explicit SDKs.
      - sdk: PhotosUI.framework

# Shared scheme so `xcodebuild -scheme Runa` works and Xcode has a runnable target.
schemes:
  Runa:
    build:
      targets:
        Runa: all
    run:
      config: Debug
